background {
    monitor =
    path = screenshot

    blur_passes = 4
    # blur_size = 10
    blur_size = 8


    # brightness = 0.65
    brightness = 0.55
    contrast = 1.0
    vibrancy = 0.18
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date '+%H:%M')"

    font_size = 140
    font_family = JetBrains Mono

    color = rgba(255,255,255,0.95)

    position = 0, -120

    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date '+%A, %B %d')"

    font_size = 20
    font_family = JetBrains Mono

    color = rgba(150,160,190,0.9)

    position = 0, -30

    halign = center
    valign = center
}

input-field {
    monitor =

    size = 280, 45

    # outer_color = rgba(122,162,247,0.8)
    outer_color = rgba(122,162,247,0.35)
    inner_color = rgba(26,27,38,0.6)

    font_color = rgba(255,255,255,1.0)

    rounding = 12

    placeholder_text = Password

    position = 0, 60

    halign = center
    valign = center
}
