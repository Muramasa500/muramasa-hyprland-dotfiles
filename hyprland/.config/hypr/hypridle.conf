# 1.b turn off keyboard backlight, comment out this section if you dont have a keyboard backlight.
listener {
    timeout = 120           # 2 min
    on-timeout = brightnessctl -sd rgb:kbd_backlight set 0 # turn off keyboard backlight.
    on-resume = brightnessctl -rd rgb:kbd_backlight        # turn on keyboard backlight.
}

# 2. Lock the screen after
listener {
    timeout = 600               # 10 min
    on-timeout = hyprlock
    on-resume =                 # Do nothing on resume for the lock event
}

# 3. Turn off monitors
listener {
    timeout = 600                                                           # 6 min
    on-timeout = hyprctl dispatch 'hl.dsp.dpms({ action = "disable" })'      # screen off when timeout has passed
    on-resume = hyprctl dispatch 'hl.dsp.dpms({ action = "enable" })' && brightnessctl -r   # screen on when activity is detected after timeout has fired.
}
