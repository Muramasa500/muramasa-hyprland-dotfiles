# ~/.config/hypr/hyprpaper.conf

wallpaper {
    monitor = DP-1
    path = ~/.config/hypr/wallpapers/wallpaper1.jpg
    fit_mode = fill
}

wallpaper {
    monitor = DP-2
    path = ~/.config/hypr/wallpapers/wallpaper2.jpg
    fit_mode = fill
}

wallpaper {
    monitor = HDMI-A-1
    path = ~/.config/hypr/wallpapers/wallpaper3.jpg
    fit_mode = fill
}
