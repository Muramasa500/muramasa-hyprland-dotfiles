# ~/.config/fuzzel/fuzzel.ini

[main]
font=JetBrainsMono Nerd Font:size=14
line-height=18

[colors]
background=24273aff
text=cad3f5ff
match=8aadf4ff
selection=494d64ff
selection-text=cad3f5ff
selection-match=eed49fff
border=8aadf4ff
placeholder=a5adceff

[border]
width=2
radius=12

[input]
prompt="Applications ❯ "

[dmenu]
mode=text
exit-immediately-if-empty=yes

[shell]
# Use bash for launching applications
command=bash
